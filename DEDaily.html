<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#4F46E5">
  <title>DeutschDaily</title>
  <link rel="icon" href="src/assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="src/styles.css?v=grammar-20260604">
</head>

<body>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo-wrap">
        <button class="sidebar-logo" onclick="nav('today')" type="button">Deutsch<em>Daily</em></button>
        <div class="sidebar-tagline">Your daily German practice</div>
      </div>
      <div class="sidebar-divider"></div>
      <nav class="nav-desktop" style="flex:1">
        <button class="nb on" id="nb-today" onclick="nav('today')"><span class="nb-icon-wrap"><span class="nb-icon">📅</span></span> Today</button>
        <button class="nb" id="nb-browse" onclick="nav('browse')"><span class="nb-icon-wrap"><span class="nb-icon">📚</span></span> Browse</button>
        <button class="nb" id="nb-vocab" onclick="nav('vocab')"><span class="nb-icon-wrap"><span class="nb-icon">🗂️</span></span> Vocab</button>
        <button class="nb" id="nb-grammar" onclick="nav('grammar')"><span class="nb-icon-wrap"><span class="nb-icon">📘</span></span> Grammar</button>
        <button class="nb" id="nb-patterns" onclick="nav('patterns')"><span class="nb-icon-wrap"><span class="nb-icon">🧩</span></span> Patterns</button>
        <button class="nb" id="nb-library" onclick="nav('saved')"><span class="nb-icon-wrap"><span class="nb-icon">📖</span></span> Library</button>
        <button class="nb" id="nb-history" onclick="nav('history')"><span class="nb-icon-wrap"><span class="nb-icon">🗓️</span></span> History</button>
        <button class="nb" id="nb-stats" onclick="nav('stats')"><span class="nb-icon-wrap"><span class="nb-icon">📊</span></span> Stats</button>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-stat">
          <div class="sfs-icon">🎯</div>
          <div><div class="sfs-val" id="sb-learned-count">0</div><div style="font-size:11px;color:var(--text-3)">sentences learned</div></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="hdr">
        <div class="hdr-in">
          <div class="hdr-mid">
            <div class="pbar-bg">
              <div class="pbar-fill" id="hpf" style="width:0%"></div>
            </div>
            <div class="pbar-lbl" id="hpl">0 / 0 sentences learned</div>
          </div>
          <button class="streak-pill" id="stk" onclick="nav('stats')" type="button">🔥 <span id="stk-n">0</span></button>
        </div>
      </div>

      <div class="app-content" id="root"></div>
    </main>

    <nav class="mobile-nav">
      <button class="mnb on" id="mnb-today" onclick="nav('today')"><span class="mnb-icon">📅</span>Today</button>
      <button class="mnb" id="mnb-browse" onclick="nav('browse')"><span class="mnb-icon">📚</span>Browse</button>
      <button class="mnb" id="mnb-vocab" onclick="nav('vocab')"><span class="mnb-icon">🗂️</span>Vocab</button>
      <button class="mnb" id="mnb-grammar" onclick="nav('grammar')"><span class="mnb-icon">📘</span>Grammar</button>
      <button class="mnb" id="mnb-patterns" onclick="nav('patterns')"><span class="mnb-icon">🧩</span>Patterns</button>
      <button class="mnb" id="mnb-library" onclick="nav('saved')"><span class="mnb-icon">📖</span>Library</button>
      <button class="mnb" id="mnb-history" onclick="nav('history')"><span class="mnb-icon">🗓️</span>History</button>
      <button class="mnb" id="mnb-stats" onclick="nav('stats')"><span class="mnb-icon">📊</span>Stats</button>
    </nav>
  </div>

  <div class="modal-overlay" id="goal-modal" style="display:none" onclick="closeGoalModal(event)" role="dialog" aria-modal="true" aria-labelledby="goal-modal-title">
    <div class="modal-box">
      <div class="modal-title" id="goal-modal-title">Set Daily Goal</div>
      <div class="modal-sub">How many new sentences to learn each day?</div>
      <div class="goal-opts-grid" id="goal-opts"></div>
      <button class="modal-done" onclick="closeGoalModal()">Done</button>
    </div>
  </div>

  <script src="src/content.js?v=history-20260523"></script>
  <script src="src/learning.js?v=history-20260523"></script>
  <script src="src/vocab.js?v=vocab-20260525"></script>
  <script src="src/grammar.js?v=grammar-20260604"></script>
  <script src="src/storage.js?v=grammar-20260604"></script>
  <script src="src/app.js?v=grammar-20260604"></script>
</body>

</html>
