    const PATTERNS = [
      { id: 'polite_request_modal', cat: 'polite', template: 'Könnten Sie bitte [Infinitiv]?', meaning: 'Could you please [do something]?', register: 'formal', grammar: 'Könnten Sie is softer than Können Sie. The main verb stays at the end.', watchOut: 'Use du only with friends or close colleagues: Kannst du bitte ...?', slots: [{ name: 'Infinitiv', examples: ['das wiederholen', 'langsamer sprechen', 'mir helfen'] }], examples: [{ de: 'Könnten Sie bitte langsamer sprechen?', en: 'Could you please speak more slowly?' }, { de: 'Könnten Sie das bitte wiederholen?', en: 'Could you please repeat that?' }, { de: 'Könnten Sie mir bitte helfen?', en: 'Could you please help me?' }] },
      { id: 'ask_meaning', cat: 'understanding', template: 'Was bedeutet [Wort/Satz]?', meaning: 'What does [word/sentence] mean?', register: 'neutral', grammar: 'Was means what; bedeutet is the verb and stays in position two.', watchOut: 'For a specific word on paper, say dieses Wort, not diese Wort.', slots: [{ name: 'Wort/Satz', examples: ['dieses Wort', 'diese Abkürzung', 'das hier'] }], examples: [{ de: 'Was bedeutet dieses Wort?', en: 'What does this word mean?' }, { de: 'Was bedeutet diese Abkürzung?', en: 'What does this abbreviation mean?' }, { de: 'Was bedeutet das auf dem Formular?', en: 'What does that mean on the form?' }] },
      { id: 'ask_write_down', cat: 'understanding', template: 'Können Sie [etwas] aufschreiben?', meaning: 'Can you write [something] down?', register: 'formal', grammar: 'Aufschreiben is separable: schreiben ... auf in many tenses; with a modal it stays together at the end.', watchOut: 'Useful for names, addresses, numbers, and official terms.', slots: [{ name: 'etwas', examples: ['das', 'die Adresse', 'den Namen'] }], examples: [{ de: 'Können Sie das bitte aufschreiben?', en: 'Can you write that down, please?' }, { de: 'Können Sie die Adresse aufschreiben?', en: 'Can you write down the address?' }, { de: 'Können Sie den Namen buchstabieren?', en: 'Can you spell the name?' }] },
      { id: 'still_learning', cat: 'understanding', template: 'Ich lerne noch Deutsch.', meaning: 'I am still learning German.', register: 'neutral', grammar: 'Noch means still; it makes the sentence sound honest and not apologetic.', watchOut: 'Do not over-apologize. This phrase is enough to set expectations.', slots: [{ name: 'Sprache', examples: ['Deutsch', 'die Sprache', 'noch'] }], examples: [{ de: 'Ich lerne noch Deutsch.', en: 'I am still learning German.' }, { de: 'Ich spreche noch nicht so gut Deutsch.', en: 'I do not speak German very well yet.' }, { de: 'Ich brauche kurz einen Moment.', en: 'I need a moment.' }] },
      { id: 'not_understood', cat: 'understanding', template: 'Ich habe [nicht alles / das Wort] verstanden.', meaning: 'I understood [not everything / the word].', register: 'neutral', grammar: 'Spoken past often uses haben + participle: habe verstanden.', watchOut: 'Nicht alles is softer than gar nichts.', slots: [{ name: 'object', examples: ['nicht alles', 'das Wort nicht', 'den letzten Satz nicht'] }], examples: [{ de: 'Ich habe nicht alles verstanden.', en: 'I did not understand everything.' }, { de: 'Ich habe den letzten Satz nicht verstanden.', en: 'I did not understand the last sentence.' }, { de: 'Ich habe das Wort nicht verstanden.', en: 'I did not understand the word.' }] },
      { id: 'ask_explain_again', cat: 'understanding', template: 'Können Sie das [anders / kurz] erklären?', meaning: 'Can you explain that [differently / briefly]?', register: 'formal', grammar: 'Das points back to what was just said; anders and kurz change how you want it explained.', watchOut: 'Erklären takes an object: das erklären, not erklären mir das in this word order.', slots: [{ name: 'manner', examples: ['anders', 'kurz', 'einfacher'] }], examples: [{ de: 'Können Sie das anders erklären?', en: 'Can you explain that differently?' }, { de: 'Können Sie das kurz erklären?', en: 'Can you explain that briefly?' }, { de: 'Können Sie das einfacher erklären?', en: 'Can you explain that more simply?' }] },
      { id: 'want_appointment', cat: 'appointments', template: 'Ich möchte einen Termin [vereinbaren / buchen].', meaning: 'I would like to make/book an appointment.', register: 'formal', grammar: 'Möchte is polite. The second verb often goes to the end.', watchOut: 'Termin means appointment, not deadline. Deadline is Frist.', slots: [{ name: 'action', examples: ['vereinbaren', 'buchen', 'verschieben'] }], examples: [{ de: 'Ich möchte einen Termin vereinbaren.', en: 'I would like to make an appointment.' }, { de: 'Ich möchte einen Termin zur Anmeldung buchen.', en: 'I would like to book an appointment for registration.' }, { de: 'Ich möchte meinen Termin verschieben.', en: 'I would like to reschedule my appointment.' }] },
      { id: 'want_polite_action', cat: 'polite', template: 'Ich möchte [Nomen] [Infinitiv].', meaning: 'I would like to [do/get/change something].', register: 'formal', grammar: 'Möchte is a polite want/request. When there is a second verb, it usually goes to the end.', watchOut: 'Use this for practical requests; use Wäre es möglich...? when you want to sound extra careful.', slots: [{ name: 'request', examples: ['meine Adresse ändern', 'eine Kopie bekommen', 'den Vertrag prüfen lassen'] }], examples: [{ de: 'Ich möchte meine Adresse ändern.', en: 'I would like to change my address.' }, { de: 'Ich möchte eine Kopie bekommen.', en: 'I would like to get a copy.' }, { de: 'Ich möchte den Vertrag prüfen lassen.', en: 'I would like to have the contract checked.' }] },
      { id: 'reschedule_appointment', cat: 'appointments', template: 'Ich würde den Termin gern [verschieben / absagen].', meaning: 'I would like to [reschedule/cancel] the appointment.', register: 'formal', grammar: 'Würde gern is polite and works well on the phone or by email.', watchOut: 'Use absagen for cancel, verschieben for move to another time.', slots: [{ name: 'action', examples: ['verschieben', 'absagen', 'bestätigen'] }], examples: [{ de: 'Ich würde den Termin gern verschieben.', en: 'I would like to reschedule the appointment.' }, { de: 'Ich würde den Termin gern absagen.', en: 'I would like to cancel the appointment.' }, { de: 'Ich würde den Termin gern bestätigen.', en: 'I would like to confirm the appointment.' }] },
      { id: 'ask_availability', cat: 'appointments', template: 'Haben Sie [noch] einen freien Termin?', meaning: 'Do you still have an available appointment?', register: 'formal', grammar: 'Einen freien Termin is accusative because it is the thing they may have.', watchOut: 'Noch makes the question sound like you know appointments may be limited.', slots: [{ name: 'time', examples: ['diese Woche', 'morgen Vormittag', 'im Mai'] }], examples: [{ de: 'Haben Sie noch einen freien Termin?', en: 'Do you still have an available appointment?' }, { de: 'Haben Sie diese Woche noch einen Termin?', en: 'Do you still have an appointment this week?' }, { de: 'Haben Sie morgen Vormittag Zeit?', en: 'Do you have time tomorrow morning?' }] },
      { id: 'works_for_you', cat: 'appointments', template: 'Passt Ihnen [Zeit]?', meaning: 'Does [time] work for you?', register: 'formal', grammar: 'Ihnen is the dative formal you. Informal is dir.', watchOut: 'Use capital Ihnen for formal you.', slots: [{ name: 'Zeit', examples: ['Dienstagvormittag', 'der Termin', '14 Uhr'] }], examples: [{ de: 'Passt Ihnen Dienstagvormittag?', en: 'Does Tuesday morning work for you?' }, { de: 'Passt Ihnen 14 Uhr?', en: 'Does 2 p.m. work for you?' }, { de: 'Passt dir morgen?', en: 'Does tomorrow work for you?' }] },
      { id: 'call_about', cat: 'phone', template: 'Ich rufe wegen [Sache] an.', meaning: 'I am calling about [something].', register: 'formal', grammar: 'Anrufen is separable: ich rufe ... an.', watchOut: 'Wegen usually takes genitive in formal German: wegen meines Termins.', slots: [{ name: 'Sache', examples: ['meines Termins', 'meiner Rechnung', 'Ihrer Nachricht'] }], examples: [{ de: 'Ich rufe wegen meines Termins an.', en: 'I am calling about my appointment.' }, { de: 'Ich rufe wegen meiner Rechnung an.', en: 'I am calling about my bill.' }, { de: 'Ich rufe wegen Ihrer Nachricht an.', en: 'I am calling about your message.' }] },
      { id: 'request_documents', cat: 'admin', template: 'Welche Unterlagen brauche ich?', meaning: 'Which documents do I need?', register: 'formal', grammar: 'Welche changes with the noun. Unterlagen is plural, so welche stays plural.', watchOut: 'Unterlagen means supporting documents, not lesson documents.', slots: [{ name: 'context', examples: ['für den Termin', 'für die Anmeldung', 'für den Antrag'] }], examples: [{ de: 'Welche Unterlagen brauche ich?', en: 'Which documents do I need?' }, { de: 'Welche Unterlagen muss ich mitbringen?', en: 'Which documents do I need to bring?' }, { de: 'Welche Unterlagen fehlen noch?', en: 'Which documents are still missing?' }] },
      { id: 'submit_send', cat: 'admin', template: 'Ich habe [etwas] eingereicht/geschickt.', meaning: 'I submitted/sent [something].', register: 'formal', grammar: 'Perfekt uses habe + participle for actions like submitted, sent, uploaded.', watchOut: 'Eingereicht sounds official; geschickt is general.', slots: [{ name: 'etwas', examples: ['den Antrag', 'die Unterlagen', 'das Formular'] }], examples: [{ de: 'Ich habe den Antrag eingereicht.', en: 'I submitted the application.' }, { de: 'Ich habe die Unterlagen geschickt.', en: 'I sent the documents.' }, { de: 'Ich habe das Formular hochgeladen.', en: 'I uploaded the form.' }] },
      { id: 'written_confirmation', cat: 'admin', template: 'Können Sie mir das schriftlich bestätigen?', meaning: 'Can you confirm that to me in writing?', register: 'formal', grammar: 'Mir is dative: to me. Schriftlich means in written form.', watchOut: 'Use this when details matter and you need proof later.', slots: [{ name: 'confirmation', examples: ['das schriftlich bestätigen', 'eine Bestätigung schicken', 'eine Kopie schicken'] }], examples: [{ de: 'Können Sie mir das schriftlich bestätigen?', en: 'Can you confirm that in writing?' }, { de: 'Können Sie mir eine Bestätigung schicken?', en: 'Can you send me a confirmation?' }, { de: 'Können Sie mir eine Kopie schicken?', en: 'Can you send me a copy?' }] },
      { id: 'deadline_until', cat: 'time', template: 'Bis wann muss ich [etwas] [machen]?', meaning: 'By when do I have to [do something]?', register: 'formal', grammar: 'Bis wann asks for a deadline; the second verb goes at the end with muss.', watchOut: 'Frist is a deadline; Termin is an appointment.', slots: [{ name: 'task', examples: ['das einreichen', 'antworten', 'die Rechnung bezahlen'] }], examples: [{ de: 'Bis wann muss ich das einreichen?', en: 'By when do I need to submit this?' }, { de: 'Bis wann muss ich antworten?', en: 'By when do I need to reply?' }, { de: 'Bis wann muss ich die Rechnung bezahlen?', en: 'By when do I need to pay the bill?' }] },
      { id: 'need_noun', cat: 'admin', template: 'Ich brauche [Nomen].', meaning: 'I need [noun].', register: 'neutral', grammar: 'Brauchen takes a direct object, so articles often appear in accusative: einen Termin, eine Bestätigung.', watchOut: 'Direct is okay for practical needs; add bitte or Könnten Sie for more politeness.', slots: [{ name: 'Nomen', examples: ['einen Termin', 'eine Bestätigung', 'Hilfe'] }], examples: [{ de: 'Ich brauche einen Termin.', en: 'I need an appointment.' }, { de: 'Ich brauche eine Bestätigung.', en: 'I need a confirmation.' }, { de: 'Ich brauche Hilfe beim Formular.', en: 'I need help with the form.' }] },
      { id: 'problem_with', cat: 'housing', template: 'Es gibt ein Problem mit [Nomen].', meaning: 'There is a problem with [noun].', register: 'formal', grammar: 'Mit takes dative: mit der Heizung, mit dem Vertrag, mit meinem Konto.', watchOut: 'Use this to start a calm problem report.', slots: [{ name: 'Nomen', examples: ['der Heizung', 'dem Vertrag', 'meinem Konto'] }], examples: [{ de: 'Es gibt ein Problem mit der Heizung.', en: 'There is a problem with the heating.' }, { de: 'Es gibt ein Problem mit dem Vertrag.', en: 'There is a problem with the contract.' }, { de: 'Es gibt ein Problem mit meiner Rechnung.', en: 'There is a problem with my bill.' }] },
      { id: 'not_working', cat: 'housing', template: '[Etwas] funktioniert nicht.', meaning: '[Something] is not working.', register: 'neutral', grammar: 'Put the broken thing first, then funktioniert nicht.', watchOut: 'Kaputt means broken; funktioniert nicht can sound less dramatic.', slots: [{ name: 'Etwas', examples: ['Die Heizung', 'Das Internet', 'Der Aufzug'] }], examples: [{ de: 'Die Heizung funktioniert nicht.', en: 'The heating is not working.' }, { de: 'Das Internet funktioniert nicht.', en: 'The internet is not working.' }, { de: 'Der Aufzug funktioniert nicht.', en: 'The lift is not working.' }] },
      { id: 'since_problem', cat: 'housing', template: 'Seit [Zeit] funktioniert [etwas] nicht.', meaning: '[Something] has not worked since/for [time].', register: 'neutral', grammar: 'Seit describes how long the problem has existed. German often keeps present tense here.', watchOut: 'Use seit gestern for since yesterday; seit drei Tagen for for three days.', slots: [{ name: 'Zeit', examples: ['gestern', 'drei Tagen', 'heute Morgen'] }], examples: [{ de: 'Seit gestern funktioniert die Heizung nicht.', en: 'The heating has not worked since yesterday.' }, { de: 'Seit drei Tagen habe ich Schmerzen.', en: 'I have had pain for three days.' }, { de: 'Seit heute Morgen habe ich kein Internet.', en: 'I have had no internet since this morning.' }] },
      { id: 'repair_visit', cat: 'housing', template: 'Wann kann jemand zur Reparatur vorbeikommen?', meaning: 'When can someone come by for the repair?', register: 'formal', grammar: 'Vorbeikommen is separable, but after kann it stays as an infinitive at the end.', watchOut: 'Jemand keeps it open: a technician, caretaker, or landlord.', slots: [{ name: 'purpose', examples: ['zur Reparatur', 'zur Kontrolle', 'zum Ablesen'] }], examples: [{ de: 'Wann kann jemand zur Reparatur vorbeikommen?', en: 'When can someone come by for the repair?' }, { de: 'Wann kann jemand zur Kontrolle vorbeikommen?', en: 'When can someone come by to check it?' }, { de: 'Wann kann der Techniker vorbeikommen?', en: 'When can the technician come by?' }] },
      { id: 'would_possible', cat: 'polite', template: 'Wäre es möglich, [zu + Infinitiv]?', meaning: 'Would it be possible to [do something]?', register: 'formal', grammar: 'Wäre es möglich is a very polite opener. The action uses zu + infinitive.', watchOut: 'Use this for requests where you want to sound careful or respectful.', slots: [{ name: 'action', examples: ['den Termin zu verschieben', 'eine Kopie zu bekommen', 'später zu kommen'] }], examples: [{ de: 'Wäre es möglich, den Termin zu verschieben?', en: 'Would it be possible to reschedule the appointment?' }, { de: 'Wäre es möglich, eine Kopie zu bekommen?', en: 'Would it be possible to get a copy?' }, { de: 'Wäre es möglich, später zu kommen?', en: 'Would it be possible to come later?' }] },
      { id: 'permission', cat: 'polite', template: 'Darf ich [Infinitiv]?', meaning: 'May I [do something]?', register: 'neutral', grammar: 'Darf asks for permission. The main verb stays at the end.', watchOut: 'Use Darf ich...? with strangers; Kann ich...? also works but is less permission-focused.', slots: [{ name: 'Infinitiv', examples: ['kurz stören', 'hier warten', 'das Fenster öffnen'] }], examples: [{ de: 'Darf ich kurz stören?', en: 'May I interrupt briefly?' }, { de: 'Darf ich hier warten?', en: 'May I wait here?' }, { de: 'Darf ich das Fenster öffnen?', en: 'May I open the window?' }] },
      { id: 'symptom_since', cat: 'health', template: 'Ich habe seit [Zeit] [Beschwerde].', meaning: 'I have had [symptom] for/since [time].', register: 'neutral', grammar: 'German uses present tense with seit for ongoing symptoms.', watchOut: 'Tell the duration; it helps the doctor judge urgency.', slots: [{ name: 'Beschwerde', examples: ['Kopfschmerzen', 'Fieber', 'Rückenschmerzen'] }], examples: [{ de: 'Ich habe seit drei Tagen Kopfschmerzen.', en: 'I have had headaches for three days.' }, { de: 'Ich habe seit gestern Fieber.', en: 'I have had a fever since yesterday.' }, { de: 'Ich habe seit einer Woche Rückenschmerzen.', en: 'I have had back pain for a week.' }] },
      { id: 'take_medicine', cat: 'health', template: 'Wie oft soll ich [Medizin] nehmen?', meaning: 'How often should I take [medicine]?', register: 'formal', grammar: 'Soll ich asks what you are supposed to do; nehmen stays at the end.', watchOut: 'Ask about frequency, amount, and whether to take it with food.', slots: [{ name: 'Medizin', examples: ['das', 'die Tabletten', 'den Saft'] }], examples: [{ de: 'Wie oft soll ich das nehmen?', en: 'How often should I take this?' }, { de: 'Wie viele Tabletten soll ich nehmen?', en: 'How many tablets should I take?' }, { de: 'Soll ich das mit Essen nehmen?', en: 'Should I take this with food?' }] },
      { id: 'unable_work', cat: 'work', template: 'Ich bin krank und komme heute nicht.', meaning: 'I am sick and will not come in today.', register: 'workplace', grammar: 'Two simple clauses joined by und. The verb stays second in each clause.', watchOut: 'For formal written messages, add a greeting and your name.', slots: [{ name: 'time', examples: ['heute', 'morgen', 'diese Woche'] }], examples: [{ de: 'Ich bin krank und komme heute nicht.', en: 'I am sick and will not come in today.' }, { de: 'Ich bin krankgeschrieben.', en: 'I am on sick leave.' }, { de: 'Ich melde mich, sobald ich mehr weiß.', en: 'I will get in touch as soon as I know more.' }] },
      { id: 'work_clarify', cat: 'work', template: 'Können wir kurz klären, [was/wie/wer] ...?', meaning: 'Can we briefly clarify [what/how/who] ...?', register: 'workplace', grammar: 'The second clause after klären often sends the verb to the end.', watchOut: 'Kurz makes the request sound lighter.', slots: [{ name: 'question', examples: ['was Priorität hat', 'wer zuständig ist', 'wie wir weitermachen'] }], examples: [{ de: 'Können wir kurz klären, was Priorität hat?', en: 'Can we briefly clarify what has priority?' }, { de: 'Können wir kurz klären, wer zuständig ist?', en: 'Can we briefly clarify who is responsible?' }, { de: 'Können wir kurz klären, wie wir weitermachen?', en: 'Can we briefly clarify how we continue?' }] },
      { id: 'send_followup', cat: 'work', template: 'Ich schicke Ihnen [etwas] später.', meaning: 'I will send you [something] later.', register: 'formal', grammar: 'Ihnen is formal dative: to you. The thing sent is accusative.', watchOut: 'Use dir for informal colleagues or friends.', slots: [{ name: 'etwas', examples: ['die Unterlagen', 'eine E-Mail', 'den Link'] }], examples: [{ de: 'Ich schicke Ihnen die Unterlagen später.', en: 'I will send you the documents later.' }, { de: 'Ich schicke Ihnen gleich eine E-Mail.', en: 'I will send you an email shortly.' }, { de: 'Ich schicke dir den Link.', en: 'I will send you the link.' }] },
      { id: 'transport_goes', cat: 'transport', template: 'Fährt diese Bahn nach/zu [Ort]?', meaning: 'Does this train/tram go to [place]?', register: 'neutral', grammar: 'Yes/no questions start with the verb: Fährt ...?', watchOut: 'Use nach for cities; zu/zum/zur for places like station, office, pharmacy.', slots: [{ name: 'Ort', examples: ['zum Hauptbahnhof', 'nach Köln', 'zur Messe'] }], examples: [{ de: 'Fährt diese Bahn zum Hauptbahnhof?', en: 'Does this train go to the main station?' }, { de: 'Fährt dieser Bus nach Köln?', en: 'Does this bus go to Cologne?' }, { de: 'Fährt die U-Bahn zur Messe?', en: 'Does the U-Bahn go to the trade fair?' }] },
      { id: 'transport_cancelled', cat: 'transport', template: 'Mein Zug fällt aus.', meaning: 'My train is cancelled.', register: 'neutral', grammar: 'Ausfallen is separable: der Zug fällt aus.', watchOut: 'Ausfall is cancellation; Verspätung is delay.', slots: [{ name: 'transport', examples: ['Zug', 'Bus', 'Flug'] }], examples: [{ de: 'Mein Zug fällt aus.', en: 'My train is cancelled.' }, { de: 'Der Bus fällt aus.', en: 'The bus is cancelled.' }, { de: 'Welche Verbindung kann ich stattdessen nehmen?', en: 'Which connection can I take instead?' }] },
      { id: 'where_change', cat: 'transport', template: 'Wo muss ich umsteigen?', meaning: 'Where do I have to change?', register: 'neutral', grammar: 'With muss, the second verb umsteigen goes to the end.', watchOut: 'Umsteigen means changing train, bus, tram, or metro.', slots: [{ name: 'detail', examples: ['in welcher Station', 'in welche Linie', 'auf welches Gleis'] }], examples: [{ de: 'Wo muss ich umsteigen?', en: 'Where do I have to change?' }, { de: 'In welche Linie muss ich umsteigen?', en: 'Which line do I have to change to?' }, { de: 'Auf welchem Gleis fährt der Zug ab?', en: 'Which platform does the train leave from?' }] },
      { id: 'looking_for', cat: 'services', template: 'Ich suche [Nomen].', meaning: 'I am looking for [noun].', register: 'neutral', grammar: 'Suchen takes a direct object: ich suche die Kasse, einen Briefkasten, eine Filiale.', watchOut: 'Do not add nach after suchen in standard German.', slots: [{ name: 'Nomen', examples: ['die Kasse', 'einen Briefkasten', 'eine Packstation'] }], examples: [{ de: 'Ich suche die Kasse.', en: 'I am looking for the checkout.' }, { de: 'Ich suche einen Briefkasten.', en: 'I am looking for a mailbox.' }, { de: 'Ich suche eine Packstation.', en: 'I am looking for a parcel locker.' }] },
      { id: 'exchange_return', cat: 'services', template: 'Ich möchte [etwas] umtauschen/zurückgeben.', meaning: 'I would like to exchange/return [something].', register: 'formal', grammar: 'Möchte is polite; the action verb goes to the end.', watchOut: 'Umtauschen means exchange; zurückgeben means return.', slots: [{ name: 'action', examples: ['umtauschen', 'zurückgeben', 'reklamieren'] }], examples: [{ de: 'Ich möchte den Artikel umtauschen.', en: 'I would like to exchange the item.' }, { de: 'Ich möchte das zurückgeben.', en: 'I would like to return this.' }, { de: 'Ich möchte den Mangel reklamieren.', en: 'I would like to report the defect.' }] },
      { id: 'parcel_pickup', cat: 'services', template: 'Ich möchte ein Paket abholen.', meaning: 'I would like to pick up a parcel.', register: 'formal', grammar: 'Abholen is separable, but with möchte it stays at the end.', watchOut: 'Bring ID when the pickup note asks for it.', slots: [{ name: 'object', examples: ['ein Paket', 'einen Brief', 'meine Sendung'] }], examples: [{ de: 'Ich möchte ein Paket abholen.', en: 'I would like to pick up a parcel.' }, { de: 'Ich habe eine Benachrichtigung bekommen.', en: 'I received a notification.' }, { de: 'Die Sendung liegt in der Filiale.', en: 'The shipment is at the branch.' }] },

    function informalize(text) {
      return text
        .replace(/Könnten Sie/g, 'Kannst du')
        .replace(/Können Sie/g, 'Kannst du')
        .replace(/Haben Sie/g, 'Hast du')
        .replace(/Sagen Sie/g, 'Sag')
        .replace(/brauchen Sie/g, 'brauchst du')
        .replace(/Brauchen Sie/g, 'Brauchst du')
        .replace(/Ihnen/g, 'dir')
        .replace(/Ihre/g, 'deine')
        .replace(/Ihren/g, 'deinen')
        .replace(/Ihrem/g, 'deinem')
        .replace(/Sie/g, 'du');
    }

    function defaultVariantsFor(seed) {
      if (Array.isArray(seed.variants)) return seed.variants;
      if (!seed.variant) return [];
      const variants = [{ label: 'Formal', de: seed.de, use: 'Use with offices, doctors, service staff, landlords, or unknown adults.' }];
      const informal = informalize(seed.de);
      if (informal !== seed.de) variants.push({ label: 'Informal', de: informal, use: 'Use with friends, close colleagues, or people who already use du with you.' });
      return variants;
    }

    function buildLearn(seed) {
      const pattern = (seed.patternIds || []).map(id => PATTERN_BY_ID[id]).find(Boolean);
      const grammar = pattern ? pattern.grammar : 'Learn this as a fixed daily-life sentence. Focus on when to use it and what answer to expect.';
      const chunks = seed.chunks || (pattern
        ? [[pattern.template, pattern.meaning], [seed.de, seed.en]]
        : [[seed.de, seed.en]]);
      return {
        meaning: seed.learnMeaning || seed.use,
        grammar: {
          title: seed.learnTitle || (pattern ? pattern.template : 'Fixed daily-life phrase'),
          simple: seed.learnGrammar || grammar,
          chunks,
          watchOut: seed.watchOut || (pattern ? pattern.watchOut : 'Use the sentence in the situation shown on the card; do not overgeneralize fixed phrases.')
        },
        variants: defaultVariantsFor(seed),
        reuse: {
          slots: seed.slots || (pattern && pattern.slots ? pattern.slots.map(slot => slot.name) : []),
          swaps: seed.swaps || (pattern && pattern.slots ? pattern.slots.flatMap(slot => slot.examples.map(ex => [slot.name, ex])) : [])
        },
        expectedReply: seed.expectedReply || 'Listen for the key detail: time, place, document, price, or next step.',
        practice: seed.practice || 'Replace one slot in the pattern and say the new sentence aloud.'
      };
    }

    const SENTENCES = SENTENCE_SEEDS.map(seed => ({ ...seed, learn: buildLearn(seed) }));

    // ══════════════════════════════════════════════
    // STORAGE
    // ══════════════════════════════════════════════
    const SKEY = 'dd_v4';
    const SKEY_OLD = 'dd_clean_v1';
    let DB = { learned: new Set(), favorites: new Set(), understood: new Set(), streak: 0, lastStudy: null, dailyGoal: 10, dailyQueue: [], dailyQueueDate: null, dailyLearned: new Set(), history: {}, historyWords: {}, srs: {} };

    function dbToObj() {
      return {
        learned: [...DB.learned], favorites: [...DB.favorites], understood: [...DB.understood],
        streak: DB.streak, lastStudy: DB.lastStudy, dailyGoal: DB.dailyGoal,
        dailyQueue: DB.dailyQueue, dailyQueueDate: DB.dailyQueueDate,
        dailyLearned: [...DB.dailyLearned], history: DB.history, historyWords: DB.historyWords, srs: DB.srs
      };
    }
    function objToDB(p) {
      DB.learned = new Set(p.learned || []); DB.favorites = new Set(p.favorites || []); DB.understood = new Set(p.understood || []);
      DB.streak = p.streak || 0; DB.lastStudy = p.lastStudy || null; DB.dailyGoal = p.dailyGoal || 10;
      DB.dailyQueue = p.dailyQueue || []; DB.dailyQueueDate = p.dailyQueueDate || null;
      DB.dailyLearned = new Set(p.dailyLearned || []); DB.history = p.history || {};
      DB.historyWords = p.historyWords || {};
      DB.srs = p.srs || {};
    }

    async function load() {
      try {
        let raw = localStorage.getItem(SKEY);
        if (!raw) raw = localStorage.getItem(SKEY_OLD);
        if (raw) objToDB(JSON.parse(raw));
      } catch (e) { }

      let needsSave = false;

      // ── Migration: remove orphaned IDs not present in SENTENCES ─────────────
      // Protects against phantom counts if sentence IDs changed across versions
      // or a bad import added non-existent IDs.
      const validIds = new Set(SENTENCES.map(s => s.id));
      DB.learned.forEach(id => { if (!validIds.has(id)) { DB.learned.delete(id); needsSave = true; } });
      DB.favorites.forEach(id => { if (!validIds.has(id)) { DB.favorites.delete(id); needsSave = true; } });
      DB.dailyLearned.forEach(id => { if (!validIds.has(id)) { DB.dailyLearned.delete(id); needsSave = true; } });

      // ── Migration: remove SRS entries for cards that were never learned ──────
      // A prior bug called srsSchedule on unlearned cards when "Still learning"
      // was tapped, giving them a future nextReview date that hid them from the
      // daily queue forever. Purge any such entries now.
      Object.keys(DB.srs).forEach(id => {
        if (!DB.learned.has(id)) { delete DB.srs[id]; needsSave = true; }
      });

      // ── Migration: deduplicate historyWords (first-recorded date wins) ───────
      // The old backfill bug copied the previous day's learned words into the
      // current day's bucket on every new-day load. Fix by keeping each word ID
      // only in its chronologically earliest date bucket.
      const hwKeys = Object.keys(DB.historyWords).sort((a, b) => {
        const pa = a.split('-').map(Number), pb = b.split('-').map(Number);
        return new Date(pa[0], pa[1] - 1, pa[2]) - new Date(pb[0], pb[1] - 1, pb[2]);
      });
      const seenHWIds = new Set();
      hwKeys.forEach(key => {
        const before = DB.historyWords[key];
        const after = before.filter(id => !seenHWIds.has(id));
        after.forEach(id => seenHWIds.add(id));
        if (after.length !== before.length) { DB.historyWords[key] = after; needsSave = true; }
      });

      // ── Migration: sync DB.learned to historyWords as source of truth ────────
      // Any word in DB.learned that has no historyWords entry in any date is an
      // orphaned ghost entry (learned via a path that never wrote historyWords,
      // or corrupted by the old backfill bug). Remove them so all counts match.
      const allTrackedIds = new Set(Object.values(DB.historyWords).flat());
      DB.learned.forEach(id => {
        if (!allTrackedIds.has(id) && !DB.dailyLearned.has(id)) {
          DB.learned.delete(id);
          delete DB.srs[id];
          needsSave = true;
        }
      });

      // ── Backfill: words learned before historyWords tracking existed ─────────
      // Only backfill if dailyQueueDate is today, otherwise dailyLearned
      // contains stale words from a previous day.
      const tk = todayKey();
      if (DB.dailyLearned.size > 0 && DB.dailyQueueDate === today()) {
        if (!DB.historyWords[tk]) DB.historyWords[tk] = [];
        DB.dailyLearned.forEach(id => {
          if (!DB.historyWords[tk].includes(id)) { DB.historyWords[tk].push(id); needsSave = true; }
        });
      }

      if (needsSave) save();
    }

    function save() {
      const json = JSON.stringify(dbToObj());
      try { localStorage.setItem(SKEY, json); } catch (e) { }
      try { if (window.storage) window.storage.set(SKEY, json); } catch (e) { }
    }
    function today() { return new Date().toDateString(); }
    function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
    function updateStreak() {
      const t = today();
      if (DB.lastStudy === t) return;
      const y = new Date(Date.now() - 86400000).toDateString();
      if (DB.lastStudy === y) DB.streak++; else if (DB.lastStudy !== t) DB.streak = 1;
      DB.lastStudy = t; save();
    }
    function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

    // ══════════════════════════════════════════════
    // SPACED REPETITION (SRS) — Anki/SM-2 Inspired
    // ══════════════════════════════════════════════
    // Review intervals by level (in days).
    // Level 0 = "new/reset" — first encounter or hard reset
    // "Got it" promotes one level; "Still learning" drops one level (min 0).
    // Intervals follow an expanding schedule similar to Anki:
    //   Level 0 → review in 1 day
    //   Level 1 → review in 3 days
    //   Level 2 → review in 7 days
    //   Level 3 → review in 14 days
    //   Level 4 → review in 30 days
    //   Level 5 → review in 60 days
    //   Level 6 → review in 90 days (mastered)
    const SRS_INTERVALS = [1, 3, 7, 14, 30, 60, 90]; // days per level

    function todayISO() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function addDaysISO(days) {
      const d = new Date(Date.now() + days * 86400000);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // Human-readable label for when next review is due
    function srsNextLabel(id) {
      const srs = DB.srs[id];
      if (!srs || !srs.nextReview) return '';
      const today = new Date(todayISO());
      const next = new Date(srs.nextReview);
      const diffMs = next - today;
      const diffDays = Math.round(diffMs / 86400000);
      if (diffDays <= 0) return 'due today';
      if (diffDays === 1) return 'due tomorrow';
      if (diffDays < 7) return `in ${diffDays} days`;
      if (diffDays < 30) return `in ${Math.round(diffDays / 7)} week${Math.round(diffDays / 7) > 1 ? 's' : ''}`;
      return `in ${Math.round(diffDays / 30)} month${Math.round(diffDays / 30) > 1 ? 's' : ''}`;
    }

    // Core scheduling: called on EVERY practice answer (not just SRS mode)
    function srsSchedule(id, gotIt) {
      if (!DB.srs[id]) DB.srs[id] = { interval: 0, ease: 2.5, level: 0, nextReview: null, lastReview: null };
      const card = DB.srs[id];
      card.lastReview = todayISO();
      
      // Ensure ease is initialized for older data
      if (!card.ease) card.ease = 2.5;
      
      if (gotIt) {
        // Anki logic for correct answer
        if (card.interval === 0 || card.interval === undefined) {
          card.interval = 1;
        } else if (card.interval === 1) {
          card.interval = 6;
        } else {
          card.interval = Math.round(card.interval * card.ease);
        }
      } else {
        // Anki logic for incorrect answer (lapse)
        card.interval = 1;
        card.ease = Math.max(1.3, card.ease - 0.20);
      }
      
      // Calculate a "level" for the UI dots (approximating intervals: 1, 3, 7, 14, 30, 60, 90)
      if (card.interval <= 1) card.level = 0;
      else if (card.interval < 7) card.level = 1;
      else if (card.interval < 14) card.level = 2;
      else if (card.interval < 30) card.level = 3;
      else if (card.interval < 60) card.level = 4;
      else if (card.interval < 90) card.level = 5;
      else card.level = 6;

      card.nextReview = addDaysISO(card.interval);
      save();
    }

    // Get IDs of learned cards that are due for review today or overdue
    function getSrsReviewIds() {
      const td = todayISO();
      return Object.entries(DB.srs)
        .filter(([id, data]) => DB.learned.has(id) && data.nextReview && data.nextReview <= td)
        .map(([id]) => id);
    }

    function getSrsLevel(id) { return (DB.srs[id] || {}).level || 0; }

    // Check if a card is scheduled for future review (not due yet)
    function isSrsScheduledFuture(id) {
      const srs = DB.srs[id];
      if (!srs || !srs.nextReview) return false;
      return srs.nextReview > todayISO();
    }

    // Track cards answered "Got it" in the current browser session
    // so they never reappear until the page is refreshed / next day
    let _sessionGotIt = new Set();

    // ══════════════════════════════════════════════
    // GRAMMAR TAG AUTO-DETECTION
    // ══════════════════════════════════════════════
    function grammarTag(de) {
      const s = de.toLowerCase();
      if (/\b(muss|müssen|kann|könn|darf|dürfen|soll|sollen|will(?!kommen|kommen)|wollen|mag(?! )|mögen|möchte|möchten|würde|würden)\b/.test(s))
        return { t: 'Modal', c: '#7C3AED', bg: '#F5F3FF' };
      if (/\b(habe|hat|hast|haben|habt|bin|bist|ist|sind|seid|war|waren)\b/.test(s) && /\bge[a-zäöüß]{2,}(t|en)\b/.test(s))
        return { t: 'Perfekt', c: '#2563EB', bg: '#EFF6FF' };
      if (/^(wo |wer |was |wann |wie |woher |wohin |welch|warum )/.test(s))
        return { t: 'W-Frage', c: '#EA580C', bg: '#FFF7ED' };
      if (/\b(nicht|kein|keine|keinen|keiner|keines|keinem)\b/.test(s))
        return { t: 'Negation', c: '#DC2626', bg: '#FEF2F2' };
      if (/\bseit\b/.test(s))
        return { t: 'seit + Dativ', c: '#D97706', bg: '#FFFBEB' };
      return null;
    }

    // Daily queue: only picks cards that are NOT already scheduled for future SRS
    function ensureDailyQueue() {
      const t = today();
      if (DB.dailyQueueDate === t && DB.dailyQueue.length > 0) {
        // Same day and queue exists — never change it. Only a new day or "New batch" should alter it.
        return;
      }
      if (DB.dailyQueueDate !== t) { DB.dailyLearned = new Set(); _sessionGotIt = new Set(); }
      // Prioritize unlearned cards, then add learned cards that are NOT scheduled for future review
      const unlearned = shuffle(SENTENCES.filter(s => !DB.learned.has(s.id) && !isSrsScheduledFuture(s.id)));
      const learnedDue = shuffle(SENTENCES.filter(s => DB.learned.has(s.id) && !isSrsScheduledFuture(s.id)));
      const pool = [...unlearned, ...learnedDue];
      DB.dailyQueue = pool.slice(0, DB.dailyGoal).map(s => s.id);
      DB.dailyQueueDate = t;
      // Restore dailyLearned from historyWords so it's accurate after a goal change or queue refresh
      const todayWordIds = (DB.historyWords[todayKey()] || []).filter(id => DB.learned.has(id));
      if (todayWordIds.length > 0) DB.dailyLearned = new Set(todayWordIds);
      save();
    }

    // ══════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════
    let V = { view: 'today', topicId: null, filter: 'all', query: '', speaking: null, libTab: 'saved', patFilter: 'all', historyDay: null };

    // ══════════════════════════════════════════════
    // PATTERN DETECTION FOR SENTENCES
    // ══════════════════════════════════════════════
    function findMatchingPattern(sentence) {
      const explicit = (sentence.patternIds || []).map(id => PATTERN_BY_ID[id]).find(Boolean);
      if (explicit) return explicit;
      if (sentence.fixed) return null;
      const de = sentence.de.toLowerCase();
      // Check each pattern to see if the sentence structure matches
      const matchers = [
        { pid: 'p4', test: s => /^kannst du /i.test(s) },
        { pid: 'p3', test: s => /^können sie /i.test(s) },
        { pid: 'p1', test: s => /^ich hätte gern/i.test(s) },
        { pid: 'p2', test: s => /^einmal .+, bitte/i.test(s) },
        { pid: 'p5', test: s => /^ich möchte /i.test(s) },
        { pid: 'p6', test: s => /^wo ist /i.test(s) },
        { pid: 'p7', test: s => /^wo finde ich /i.test(s) },
        { pid: 'p8', test: s => /^wie komme ich /i.test(s) },
        { pid: 'p9', test: s => /^ich brauche /i.test(s) },
        { pid: 'p10', test: s => /^ich suche /i.test(s) },
        { pid: 'p11', test: s => /^haben sie /i.test(s) },
        { pid: 'p12', test: s => /\bseit \w+ (tagen|wochen|monaten|jahren)\b/i.test(s) || /^seit wann/i.test(s) },
        { pid: 'p15', test: s => / funktioniert nicht/i.test(s) },
        { pid: 'p16', test: s => / ist kaputt/i.test(s) },
        { pid: 'p17', test: s => /ich habe .+ verloren/i.test(s) },
        { pid: 'p18', test: s => /^es gibt ein problem/i.test(s) },
        { pid: 'p19', test: s => /^ich bin \w+\.?$/i.test(s) },
        { pid: 'p20', test: s => /^mir ist /i.test(s) },
        { pid: 'p21', test: s => /ich habe \w*schmerzen/i.test(s) },
        { pid: 'p22', test: s => /das macht mir /i.test(s) },
        { pid: 'p23', test: s => /ich habe .+ge\w+(t|en)\b/i.test(s) },
        { pid: 'p24', test: s => /^ich war /i.test(s) },
        { pid: 'p26', test: s => /^ich werde /i.test(s) },
        { pid: 'p28', test: s => /^wollen wir /i.test(s) },
        { pid: 'p29', test: s => /^ich finde /i.test(s) },
        { pid: 'p31', test: s => /das gefällt mir/i.test(s) },
        { pid: 'p32', test: s => /^entschuldigung/i.test(s) },
        { pid: 'p33', test: s => /^es tut mir leid/i.test(s) },
        { pid: 'p34', test: s => /^darf ich /i.test(s) },
        { pid: 'p37', test: s => /^bitte \w+en sie /i.test(s) },
        { pid: 'p38', test: s => /gibt es .+ in der nähe/i.test(s) },
      ];
      for (const m of matchers) {
        if (m.test(de)) {
          const pattern = PATTERNS.find(p => p.id === m.pid);
          if (pattern) return pattern;
        }
      }
      return null;
    }
    function nav(view, extra) { V.view = view; if (extra) V.topicId = extra; V.filter = 'all'; V.query = ''; render(); window.scrollTo(0, 0); }

    // ══════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════
    function render() {
      updateHeader();
      updateNavBtns();
      const root = document.getElementById('root');
      if (V.view === 'today') root.innerHTML = renderToday();
      else if (V.view === 'browse' && V.topicId) root.innerHTML = renderTopic();

    function updateHeader() {
      const tot = SENTENCES.length, done = DB.learned.size, pct = tot ? Math.round(done / tot * 100) : 0;
      document.getElementById('hpf').style.width = pct + '%';
      document.getElementById('hpl').textContent = `${done} / ${tot} learned`;
      document.getElementById('stk-n').textContent = DB.streak;
    }
    function updateNavBtns() {
      ['today', 'browse', 'patterns', 'stats'].forEach(v => {
        const el = document.getElementById('nb-' + v);
        if (el) el.className = 'nb' + (V.view === v ? ' on' : '');
        const mel = document.getElementById('mnb-' + v);
        if (mel) mel.className = 'mnb' + (V.view === v ? ' on' : '');
      });
      const libBtn = document.getElementById('nb-library');
      if (libBtn) libBtn.className = 'nb' + (V.view === 'saved' ? ' on' : '');
      const mLibBtn = document.getElementById('mnb-library');
      if (mLibBtn) mLibBtn.className = 'mnb' + (V.view === 'saved' ? ' on' : '');
      const histBtn = document.getElementById('nb-history');
      if (histBtn) histBtn.className = 'nb' + (V.view === 'history' || V.view === 'history-day' ? ' on' : '');
      const mHistBtn = document.getElementById('mnb-history');
      if (mHistBtn) mHistBtn.className = 'mnb' + (V.view === 'history' || V.view === 'history-day' ? ' on' : '');
      const sc = document.getElementById('sb-learned-count');
      if (sc) sc.textContent = DB.learned.size;
    }

    // ─── TODAY ───────────────────────────────────
    function renderToday() {
      ensureDailyQueue();
      const qs = DB.dailyQueue.map(id => SENTENCES.find(s => s.id === id)).filter(Boolean);
      const lt = DB.dailyLearned.size;
      const tot = qs.length, pct = tot ? Math.round(lt / tot * 100) : 0, done = lt === tot && tot > 0;

      const gc = `<div class="goal-card">
    <div class="goal-top">
      <div><div class="goal-title">📅 Today's Practice</div><div class="goal-date">${new Date().toLocaleDateString('en-DE', { weekday: 'long', day: 'numeric', month: 'long' })}</div></div>
      <button class="goal-btn" onclick="openGoalModal()">Goal: ${DB.dailyGoal} ✏️</button>
    </div>
    <div class="goal-nums">
      <div><div class="gnum-v" style="color:var(--green)">${lt}</div><div class="gnum-l">Learned today</div></div>
      <div><div class="gnum-v" style="color:var(--text-3)">${Math.max(0, tot - lt)}</div><div class="gnum-l">Remaining</div></div>
      <div><div class="gnum-v" style="color:var(--accent)">${DB.dailyGoal}</div><div class="gnum-l">Daily goal</div></div>
      <div><div class="gnum-v" style="color:var(--blue)">${DB.learned.size}</div><div class="gnum-l">Total ever</div></div>
    </div>
    ${done ? `<div class="goal-complete">🎉 Daily goal complete! Come back tomorrow.</div>` : `<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div>`}
  </div>`;

      return `${gc}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:14px;font-weight:600;color:var(--text)">Today's ${tot} Sentences</div>
      <div style="display:flex;gap:7px">
        <button onclick="startPractice({ids:${JSON.stringify(qs.map(s => s.id)).replace(/"/g, "'")}})" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">🎯 Practice</button>
        <button onclick="refreshQueue()" style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-2);font-family:'Inter',sans-serif;font-weight:500">🔄 New batch</button>
      </div>
    </div>
    
    ${qs.map((s, i) => renderSentenceCard(s, i, true)).join('')}`;
    }

    // ─── BROWSE ──────────────────────────────────
    function renderBrowse() {
      const topicCards = TOPICS.map(t => {
        const tot = SENTENCES.filter(s => s.t === t.id).length;
        const done = SENTENCES.filter(s => s.t === t.id && DB.learned.has(s.id)).length;
        const pct = tot ? Math.round(done / tot * 100) : 0;
        return `<div class="topic-card" onclick="nav('browse','${t.id}')" style="--tc:${t.color}">
      <span class="tc-emoji">${t.emoji}</span>
      <div class="tc-name">${t.name}</div>
      <div class="tc-de">${t.german}</div>
      <div class="tc-prog"><span class="tc-count">${done}/${tot}</span><div class="tc-bar-bg"><div class="tc-bar-fill" style="width:${pct}%;background:var(--tc)"></div></div></div>
    </div>`;
      }).join('');
      return `<div style="padding-top:14px">
    <h2 class="page-title">Browse</h2>
    <p class="page-sub">${SENTENCES.length} sentences - ${PATTERNS.length} patterns - ${TOPICS.length} topics</p>
    <div class="topic-grid">${topicCards}</div>
  </div>`;
    }

    // ─── TOPIC ───────────────────────────────────
    function renderTopic() {
      const topic = TOPICS.find(t => t.id === V.topicId);
      if (!topic) return renderBrowse();
      let sents = SENTENCES.filter(s => s.t === V.topicId);
      if (V.filter === 'learned') sents = sents.filter(s => DB.learned.has(s.id));
      else if (V.filter === 'unlearned') sents = sents.filter(s => !DB.learned.has(s.id));
      else if (V.filter === 'favorites') sents = sents.filter(s => DB.favorites.has(s.id));
      if (V.query) { const q = V.query.toLowerCase(); sents = sents.filter(s => s.de.toLowerCase().includes(q) || s.en.toLowerCase().includes(q)); }
      const done = SENTENCES.filter(s => s.t === V.topicId && DB.learned.has(s.id)).length;
      const tot = SENTENCES.filter(s => s.t === V.topicId).length;
      const allTopicIds = JSON.stringify(SENTENCES.filter(s => s.t === V.topicId).map(s => s.id)).replace(/"/g, "'");
      const unlearnedTopicIds = JSON.stringify(SENTENCES.filter(s => s.t === V.topicId && !DB.learned.has(s.id)).map(s => s.id)).replace(/"/g, "'");
      const practiceTopicBtn = `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button onclick="startPractice({ids:${allTopicIds}})" style="flex:1;background:var(--accent);color:white;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">🎯 Practice All ${tot}</button>
    ${SENTENCES.filter(s => s.t === V.topicId && !DB.learned.has(s.id)).length > 0 ? `<button onclick="startPractice({ids:${unlearnedTopicIds}})" style="flex:1;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-2);font-family:'Inter',sans-serif;transition:all 0.15s" onmouseover="this.style.borderColor='var(--border-strong)'" onmouseout="this.style.borderColor='var(--border)'">📚 Unlearned Only (${tot - done})</button>` : ''}
  </div>`;
      const cards = sents.length ? sents.map((s, i) => renderSentenceCard(s, i, false)).join('') : `<div class="empty-state"><div class="empty-icon">🔍</div>No sentences match.</div>`;
      return `<button class="back-btn" onclick="nav('browse')">← All Topics</button>
    <div class="topic-hdr">
      <div class="topic-hdr-em">${topic.emoji}</div>
      <div><div class="topic-hdr-name">${topic.name}</div><div class="topic-hdr-de">${topic.german}</div>
        <div class="topic-hdr-stats"><span class="topic-stat"><strong>${done}</strong> learned</span><span class="topic-stat"><strong>${tot - done}</strong> remaining</span></div>
      </div>
    </div>
    <div class="filter-row">
      ${['all', 'unlearned', 'learned', 'favorites'].map(f => `<div class="filter-chip${V.filter === f ? ' on' : ''}" onclick="setFilter('${f}')">${f === 'all' ? 'All' : f === 'unlearned' ? 'To Learn' : f === 'learned' ? '✓ Learned' : '⭐ Saved'}</div>`).join('')}
    </div>
    ${practiceTopicBtn}
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Search..." value="${V.query}" oninput="setQuery(this.value)" type="text"></div>
    
    ${cards}`;
    }

    function esc(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderSentenceLearnPanel(s, compact = false, idPrefix = 'gm-') {
      const learn = s.learn;
      if (!learn) return '';
      const pattern = findMatchingPattern(s);
      const variants = learn.variants || [];
      const swaps = (learn.reuse && learn.reuse.swaps ? learn.reuse.swaps : []).slice(0, 4);
      const chunks = (learn.grammar && learn.grammar.chunks ? learn.grammar.chunks : []).slice(0, compact ? 2 : 4);
      const variantHtml = variants.length
        ? variants.map(v => `<span class="variant-pill"><strong>${esc(v.label)}</strong>${esc(v.de)}${v.use ? `<br><span class="learn-muted">${esc(v.use)}</span>` : ''}</span>`).join('')
        : '<span class="learn-muted">This sentence is already the best everyday form for the shown situation.</span>';
      const swapHtml = swaps.length
        ? swaps.map(([slot, ex]) => `<div class="learn-chunk"><strong>${esc(slot)}</strong><span class="learn-muted">${esc(ex)}</span></div>`).join('')
        : '<span class="learn-muted">Use this as a fixed phrase in the situation shown.</span>';
      return `<div class="learn-panel${compact ? ' compact' : ''}" id="${idPrefix}${s.id}">
    <div class="learn-title">Learn more: ${esc(learn.grammar.title)}</div>
    <div>${esc(learn.meaning)}</div>
    <div class="learn-grid">
      <div class="learn-box">
        <div class="learn-box-title">Why it works</div>
        <div>${esc(learn.grammar.simple)}</div>
        ${learn.grammar.watchOut ? `<div style="margin-top:6px"><strong>Watch out:</strong> ${esc(learn.grammar.watchOut)}</div>` : ''}
      </div>
      <div class="learn-box">
        <div class="learn-box-title">Pattern</div>
        <div>${pattern ? `<strong>${esc(pattern.template)}</strong><br><span class="learn-muted">${esc(pattern.meaning)}</span>` : '<span class="learn-muted">Fixed daily-life phrase.</span>'}</div>
      </div>
      <div class="learn-box">
        <div class="learn-box-title">Breakdown</div>
        ${chunks.map(([de, en]) => `<div class="learn-chunk"><strong>${esc(de)}</strong><span class="learn-muted">${esc(en)}</span></div>`).join('')}
      </div>
      <div class="learn-box">
        <div class="learn-box-title">Variants</div>
        ${variantHtml}
      </div>
      ${compact ? '' : `<div class="learn-box">
        <div class="learn-box-title">Reusable swaps</div>
        ${swapHtml}
      </div>
      <div class="learn-box">
        <div class="learn-box-title">Use it actively</div>
        <div><strong>You may hear:</strong> ${esc(learn.expectedReply)}</div>
        <div style="margin-top:5px"><strong>Practice:</strong> ${esc(learn.practice)}</div>
      </div>`}
    </div>
  </div>`;
    }

    function toggleLearnMore(id) {
      const el = document.getElementById('gm-' + id);
      if (!el) return;
      el.classList.toggle('open');
    }

    // ─── SENTENCE CARD ───────────────────────────
    function renderSentenceCard(s, i, showTopic) {
      const lrn = DB.learned.has(s.id), fav = DB.favorites.has(s.id);
      const topic = TOPICS.find(t => t.id === s.t);
      const gram = grammarTag(s.de);
      const srsLvl = getSrsLevel(s.id);
      const srsDots = lrn ? `<span class="srs-dots">${SRS_INTERVALS.map((_, i) => `<span class="srs-dot${i < srsLvl ? ' filled' : ''}"></span>`).join('')}</span>` : '';
      const matchedPattern = findMatchingPattern(s);
      const patTag = matchedPattern ? `<span class="pattern-tag" title="This sentence uses a pattern">🧩 ${matchedPattern.template.replace(/\[.*?\]/g, '…').substring(0, 25)}</span>` : '';
      const patExplain = matchedPattern ? `<div class="pattern-explain" id="pe-${s.id}">
    <div class="pe-title">🧩 Pattern: ${matchedPattern.template}</div>
    <div class="pe-meaning">${matchedPattern.meaning}</div>
    <div class="pe-examples">Try more sentences with this pattern:
      ${matchedPattern.examples.filter(e => e.de !== s.de).slice(0, 2).map(e => `<div class="pe-example"><strong>${e.de}</strong> — ${e.en}</div>`).join('')}
    </div>
  </div>` : '';
      return `<div class="sc${lrn ? ' lrn' : ''}${fav ? ' fav' : ''}" id="sc-${s.id}">
    <div class="sc-top">
      ${showTopic && topic ? `<span class="topic-label">${topic.emoji} ${topic.name}</span>` : ''}
      <span class="lvl-tag l${s.lv}">${s.lv}</span>
      ${gram ? `<span class="gram-tag" style="color:${gram.c};background:${gram.bg}">${gram.t}</span>` : ''}
      ${patTag}
      ${lrn ? `<span class="lrn-badge">✓ Learned</span>${srsDots}` : ''}
    </div>
    <div class="sentence-de" onclick="toggleReveal('${s.id}')">${s.de}</div>
    <div class="sentence-ph"><span class="ph-lbl">🔊</span>${s.ph}</div>
    <div class="reveal-hint" id="hn-${s.id}">👆 Tap to reveal translation</div>
    <div class="sentence-en hid" id="en-${s.id}" onclick="toggleReveal('${s.id}')">${s.en}</div>
    
    <div class="sentence-use" id="us-${s.id}" style="display:none">💬 ${s.use}</div>
    ${patExplain}
    ${renderSentenceLearnPanel(s)}
    <div class="card-actions">
      <button class="act-btn${V.speaking === s.id ? ' is-playing' : ''} speak-btn" data-id="${s.id}" onclick="speak('${s.de.replace(/'/g, "\\'")}','${s.id}')">
        ${ICO.speak} ${V.speaking === s.id ? `<span class="pulse">Playing…</span>` : 'Listen'}
      </button>
      <button class="act-btn" onclick="toggleLearnMore('${s.id}')">🧠 Learn more</button>
      <button class="act-btn${lrn ? ' is-learned' : ''}" id="lrn-btn-${s.id}" onclick="toggleLearned('${s.id}')">
        ${ICO.check} ${lrn ? 'Learned' : 'Mark done'}
      </button>
      <button class="act-btn${fav ? ' is-fav' : ''}" id="fav-btn-${s.id}" onclick="toggleFav('${s.id}')">
        ${ICO.star} ${fav ? 'Saved' : 'Save'}
      </button>
    </div>
  </div>`;
    }

    // ─── PATTERNS ────────────────────────────────
    function renderPatterns() {
      let pats = PATTERNS;
      if (V.patFilter === 'understood') pats = pats.filter(p => DB.understood.has(p.id));
      else if (V.patFilter === 'new') pats = pats.filter(p => !DB.understood.has(p.id));

      const undCount = DB.understood.size;
      const cards = pats.length ? pats.map((p, i) => renderPatternCard(p, i)).join('') : `<div class="empty-state"><div class="empty-icon">🔍</div>No patterns match.</div>`;
      const allPatIds = JSON.stringify(pats.map(p => p.id)).replace(/"/g, "'");
      const newPatIds = JSON.stringify(pats.filter(p => !DB.understood.has(p.id)).map(p => p.id)).replace(/"/g, "'");
      const undPatIds = JSON.stringify(pats.filter(p => DB.understood.has(p.id)).map(p => p.id)).replace(/"/g, "'");
      return `<div style="padding-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
      <h2 class="page-title" style="margin-top:0">Sentence Patterns</h2>
      <span style="font-size:12px;font-weight:500;color:var(--purple)">${undCount}/${PATTERNS.length} understood</span>
    </div>
    <p class="page-sub">Master these ${PATTERNS.length} patterns → build hundreds of sentences</p>
    
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${pats.length > 0 ? `<button onclick="startPatternPractice({ids:${allPatIds}})" style="flex:1;background:var(--purple);color:white;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">🧩 Practice All (${pats.length})</button>` : ''}
      ${pats.filter(p => !DB.understood.has(p.id)).length > 0 ? `<button onclick="startPatternPractice({ids:${newPatIds}})" style="flex:1;background:var(--white);border:1px solid var(--purple-border);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--purple);font-family:'Inter',sans-serif;transition:all 0.15s">📚 New Only (${pats.filter(p => !DB.understood.has(p.id)).length})</button>` : ''}
      ${pats.filter(p => DB.understood.has(p.id)).length > 0 ? `<button onclick="startPatternPractice({ids:${undPatIds}})" style="flex:1;background:var(--white);border:1px solid var(--green-border);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--green);font-family:'Inter',sans-serif;transition:all 0.15s">✅ Learned (${pats.filter(p => DB.understood.has(p.id)).length})</button>` : ''}
    </div>
    

    <div class="filter-row">
      <div class="filter-chip${V.patFilter === 'all' ? ' on' : ''}" onclick="setPatFilter('all')">All</div>
      <div class="filter-chip${V.patFilter === 'new' ? ' on' : ''}" onclick="setPatFilter('new')">📚 To Learn</div>
      <div class="filter-chip${V.patFilter === 'understood' ? ' on' : ''}" onclick="setPatFilter('understood')">✅ Understood</div>
    </div>

    ${cards}
  </div>`;
    }

    function setPatFilter(f) { V.patFilter = f; render(); }

    function renderPatternCard(p, i) {
      const und = DB.understood.has(p.id);
      const cat = PAT_CATS.find(c => c.id === p.cat);
      const tpl = p.template.replace(/\[([^\]]+)\]/g, '<span class="pat-blank">[$1]</span>');
      return `<div class="pc${und ? ' und' : ''}" id="pc-${p.id}">
    ${cat ? `<span class="pat-cat-tag">${cat.icon} ${cat.label}</span>` : ''}
    <div class="pat-template">${tpl}</div>
    <div class="pat-meaning">${p.meaning}</div>
    <div class="pat-examples">${p.examples.map((e, ei) => `<div class="pat-ex"><div class="pat-de"><span class="pat-ex-speak" onclick="event.stopPropagation();speak('${e.de.replace(/'/g, "\\'").replace(/"/g, '&quot;')}','pex-${p.id}-${ei}')" title="Listen">🔊</span> ${e.de}</div><div class="pat-en">${e.en}</div></div>`).join('')}</div>
    <div class="pat-actions">
      <button class="act-btn${und ? ' is-learned' : ''}" onclick="toggleUnderstood('${p.id}')">
        ${ICO.check} ${und ? 'Understood ✓' : 'Mark understood'}
      </button>
      <button class="act-btn speak-btn" data-id="p${p.id}" onclick="speak('${p.examples[0].de.replace(/'/g, "\\'")}','p${p.id}')">
        ${ICO.speak} Listen
      </button>
      <button class="act-btn" onclick="startPatternPractice({ids:['${p.id}']})" style="color:var(--purple)">
        🧩 Practice
      </button>
    </div>
  </div>`;
    }

    // ─── SAVED / LIBRARY ─────────────────────────
    function setLibTab(tab) { V.libTab = tab; render(); }

    function renderSaved() {
      const favSents = SENTENCES.filter(s => DB.favorites.has(s.id));
      const learnedSents = SENTENCES.filter(s => DB.learned.has(s.id));
      const tabs = `<div class="lib-tabs">
    <button class="lib-tab${V.libTab === 'saved' ? ' on' : ''}" onclick="setLibTab('saved')">⭐ Saved (${favSents.length})</button>
    <button class="lib-tab${V.libTab === 'learned' ? ' on' : ''}" onclick="setLibTab('learned')">📗 Learned (${learnedSents.length})</button>
  </div>`;

      // SRS due-for-review section
      const reviewIds = getSrsReviewIds();
      const reviewSents = reviewIds.map(id => SENTENCES.find(s => s.id === id)).filter(Boolean);
      const reviewSection = reviewSents.length ? (() => {
        const ids = JSON.stringify(reviewSents.map(s => s.id)).replace(/"/g, "'");
        return `<div class="review-section">
      <div class="review-section-hdr">
        <div class="review-section-title">🔁 Due for Review <span class="review-count-badge">${reviewSents.length}</span></div>
        <button class="review-practice-btn" onclick="startPractice({ids:${ids},isSRS:true})">Practice Now</button>
      </div>
      <div class="review-section-sub">These sentences are scheduled for review today - spaced repetition in action!</div>
    </div>`;
      })() : '';

      if (V.libTab === 'learned') return renderLearnedTab(tabs, learnedSents, reviewSection);
      if (!favSents.length) return `<div style="padding-top:14px"><h2 class="page-title">Library</h2>${tabs}${reviewSection}<div class="empty-state" style="padding-top:40px"><div class="empty-icon">⭐</div>No saved sentences yet.<br><span style="font-size:13px">Tap ⭐ Save on any card.</span></div></div>`;
      const favIds = JSON.stringify(favSents.map(s => s.id)).replace(/"/g, "'");
      return `<div style="padding-top:14px"><h2 class="page-title">Library</h2>${tabs}${reviewSection}
    <div class="learned-cta">
      <div class="learned-cta-info">
        <div class="learned-cta-title">⭐ ${favSents.length} saved sentence${favSents.length !== 1 ? 's' : ''}</div>
        <div class="learned-cta-sub">Practice your saved words</div>
      </div>
      <button class="learned-practice-btn" onclick="startPractice({ids:${favIds}})">🎯 Practice All</button>
    </div>
    ${favSents.map((s, i) => renderSentenceCard(s, i, true)).join('')}</div>`;
    }

    function renderLearnedTab(tabs, learnedSents, reviewSection) {
      if (!learnedSents.length) return `<div style="padding-top:14px"><h2 class="page-title">Library</h2>${tabs}<div class="empty-state" style="padding-top:40px"><div class="empty-icon">📗</div>No learned sentences yet.<br><span style="font-size:13px">Mark sentences ✓ Done to track your progress.</span></div></div>`;

      // SRS due words
      const dueIds = getSrsReviewIds();
      const dueSents = dueIds.map(id => SENTENCES.find(s => s.id === id)).filter(Boolean);

      // Words reviewed today (practiced via SRS today, now scheduled for future)
      const td = todayISO();
      const reviewedTodaySents = learnedSents.filter(s => {
        const srs = DB.srs[s.id];
        return srs && srs.lastReview === td && !dueIds.includes(s.id);
      });

      const dueIdsJson = JSON.stringify(dueSents.map(s => s.id)).replace(/"/g, "'");

      // Due for practice section with individual cards
      const dueSection = dueSents.length ? `
        <div class="review-section">
          <div class="review-section-hdr">
            <div class="review-section-title">🔁 Due for Review <span class="review-count-badge">${dueSents.length}</span></div>
            <button class="review-practice-btn" onclick="startPractice({ids:${dueIdsJson},isSRS:true})">🎯 Practice Due</button>
          </div>
          <div class="review-section-sub">These sentences are scheduled for review today — spaced repetition in action!</div>
        </div>

    // ─── TTS ─────────────────────────────────────
    // ── TTS Engine ──────────────────────────────────────────────────────────────
    // Strategy:
    //   Mobile  → Web Speech API directly (CORS + async error callbacks kill
    //              gesture context before external audio ever plays on iOS/Android)
    //   Desktop → external TTS APIs first (natural voice), Web Speech fallback
    //   Brave   → external APIs are blocked by Shields; Web Speech fallback fires
    //              automatically. On macOS Brave that gives "Anna" (decent);
    //              Windows gives Microsoft Hedda/Katja. Users can disable Shields
    //              on this page to restore the natural Google voice.

    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    // Brave exposes navigator.brave (an object with .isBrave())
    const isBrave = !!(navigator.brave);

    let _ttsAudio = null;
    let _bestVoice = null;
    let _voicesLoaded = false;

    // Pick the best available German voice
    function pickBestGermanVoice() {
      if (!window.speechSynthesis) return null;
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return null;

      const deVoices = voices.filter(v => v.lang.startsWith('de'));
      if (!deVoices.length) return null;

      const priority = [
        v => /google/i.test(v.name) && /deutsch|german|de/i.test(v.name),
        v => /microsoft.*katja|microsoft.*hedda|microsoft.*stefan/i.test(v.name),
        v => /microsoft/i.test(v.name) && deVoices.includes(v),
        v => /neural|natural|premium|enhanced/i.test(v.name) && deVoices.includes(v),
        v => /anna|german|deutsch/i.test(v.name) && deVoices.includes(v),
        v => deVoices.includes(v),
      ];

      for (const test of priority) {
        const match = deVoices.find(test);
        if (match) return match;
      }
      return deVoices[0];
    }

    // Pre-load voices; also retry on voiceschanged (Chrome fires it async)
    function _initVoices() {
      _bestVoice = pickBestGermanVoice();
      _voicesLoaded = true;
    }
    if (window.speechSynthesis) {
      speechSynthesis.onvoiceschanged = _initVoices;
      _initVoices(); // synchronous browsers (Firefox, some mobile)
    }

    // External TTS API cascade (desktop only)
    const TTS_ENGINES = [
      (text) => `https://api.streamelements.com/kappa/v2/speech?voice=de-DE-Wavenet-C&text=${encodeURIComponent(text)}`,
      (text) => `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=de&client=gtx`,
    ];

    function speak(text, id) {
      // Toggle off if same sentence is already playing
      if (V.speaking === id) {
        if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
        else if (window.speechSynthesis) speechSynthesis.cancel();
        V.speaking = null; updateSpeakBtns(); return;
      }

      // Cancel whatever is playing
      if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
      if (window.speechSynthesis) speechSynthesis.cancel();
      V.speaking = id; updateSpeakBtns();

      let finished = false;
      const done = () => {
        if (finished) return;
        finished = true;
        V.speaking = null; updateSpeakBtns(); _ttsAudio = null;
      };

      function speakWithWebSpeech() {
        if (!window.speechSynthesis) { done(); return; }
        // Re-pick voice each time in case voices loaded after page init
        if (!_bestVoice) _bestVoice = pickBestGermanVoice();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'de-DE';
        u.rate = 0.82;
        u.pitch = 1;
        u.volume = 1;
        if (_bestVoice) u.voice = _bestVoice;
        u.onend = done;
        u.onerror = done;
        speechSynthesis.speak(u);
      }

      // ── Mobile: go straight to Web Speech ───────────────────────────────────
      // On iOS/Android, async error callbacks from failed Audio() attempts expire
      // the user-gesture context, making both Audio AND SpeechSynthesis silently
      // fail. Calling Web Speech synchronously (still inside the tap handler)
      // keeps the gesture context alive and audio plays correctly.
      if (isMobile) {
        speakWithWebSpeech();
        return;
      }

      // ── Desktop: try external APIs, fall back to Web Speech ─────────────────
      function tryEngine(idx) {
        if (idx >= TTS_ENGINES.length) {
          speakWithWebSpeech();
          return;
        }
        const audio = new Audio();
        _ttsAudio = audio;
        let errored = false;
        audio.onended = done;
        audio.onerror = () => {
          if (errored) return;
          errored = true;
          _ttsAudio = null;
          tryEngine(idx + 1);
        };
        audio.src = TTS_ENGINES[idx](text);
        audio.playbackRate = 0.85;
        audio.play().catch(() => {
          if (errored) return;
          errored = true;
          _ttsAudio = null;
          tryEngine(idx + 1);
        });
      }
      tryEngine(0);
    }

        const modeTag = P.dir === 'en2de'

      } else {

    function practiceAnswer(got) {
      const currentCard = P.queue[P.idx];

      // Only update SRS for already-learned cards, or when marking a new card as learned.
      // Calling srsSchedule on an unlearned card with got=false would schedule it
      // for a future date via isSrsScheduledFuture, hiding it from the daily queue.
      if (DB.learned.has(currentCard.id) || got) {
        srsSchedule(currentCard.id, got);
      }

      if (got) {
        // ─── GOT IT ───
        // Mark learned, track in session so it won't reappear
        P.got++;
        _sessionGotIt.add(currentCard.id);
        if (!DB.learned.has(currentCard.id)) {
          DB.learned.add(currentCard.id);
          DB.dailyLearned.add(currentCard.id);
          updateStreak();
          const k = todayKey();
          DB.history[k] = (DB.history[k] || 0) + 1;
          if (!DB.historyWords[k]) DB.historyWords[k] = [];
          if (!DB.historyWords[k].includes(currentCard.id)) DB.historyWords[k].push(currentCard.id);
        }
        // Remove any future duplicates of this card from the queue
        const remaining = P.queue.slice(P.idx + 1).filter(s => s.id !== currentCard.id);
        P.queue = [...P.queue.slice(0, P.idx + 1), ...remaining];
      } else {
        // ─── STILL LEARNING ───
        // DO NOT re-insert into the current session queue.
        // The card is now scheduled via SRS for the appropriate future date
        // (tomorrow at minimum). This avoids the frustrating loop of seeing
        // the same card repeatedly in one practice session.
        P.again++;
        // Remove any future duplicates of this card from the queue
        const remaining = P.queue.slice(P.idx + 1).filter(s => s.id !== currentCard.id);
        P.queue = [...P.queue.slice(0, P.idx + 1), ...remaining];
      }
      save();
      P.idx++; P.revealed = false; renderPractice();
      updateHeader();
    }

    function practiceNext() {
      if (P.idx < P.queue.length) { P.idx++; P.revealed = false; renderPractice(); }
    }

    function practicePrev() {
      if (P.idx > 0) { P.idx--; P.revealed = false; renderPractice(); }
    }

    function closePractice() { P.active = false; PP.active = false; const ov = document.getElementById('practice-overlay'); if (ov) ov.remove(); render(); }

    function startPatternPractice(opts) {
      const ids = Array.isArray(opts) ? opts : opts.ids;

      if (!pats.length) return;
      PP = { active: true, queue: shuffle([...pats]), idx: 0, revealed: false, got: 0, again: 0 };
      renderPatternPractice();
    }

          <div style="font-size:17px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:10px;padding:14px;background:var(--bg);border-radius:10px;border-left:3px solid var(--purple-border)">${p.meaning}</div>
          ${PP.revealed
            ? `<div style="padding-top:12px;border-top:1px solid var(--border)">

    function patternPracticeAnswer(got) {
      const p = PP.queue[PP.idx];
      if (got) {
        PP.got++;
        DB.understood.add(p.id);
      } else {
        PP.again++;
        DB.understood.delete(p.id);
      }
      save();
      PP.idx++; PP.revealed = false; renderPatternPractice();
    }

    function patternPracticeNext() {
      if (PP.idx < PP.queue.length) { PP.idx++; PP.revealed = false; renderPatternPractice(); }
    }

    function patternPracticePrev() {
      if (PP.idx > 0) { PP.idx--; PP.revealed = false; renderPatternPractice(); }
    }

    // ─── KEYBOARD SHORTCUTS ───────────────────────
    document.addEventListener('keydown', e => {
      // Pattern practice keyboard shortcuts
      if (PP.active) {
        if (e.key === 'Escape') { closePractice(); return; }
        if (PP.idx >= PP.queue.length) return;
        if (e.code === 'Space') { e.preventDefault(); patternPracticeReveal(); return; }
        if (e.code === 'ArrowRight') { e.preventDefault(); patternPracticeNext(); return; }
        if (e.code === 'ArrowLeft') { e.preventDefault(); patternPracticePrev(); return; }
        return;
      }
      // Sentence practice keyboard shortcuts
      if (!P.active) return;
      if (e.key === 'Escape') { closePractice(); return; }
      if (P.idx >= P.queue.length) return;
      if (e.code === 'Space') { e.preventDefault(); practiceReveal(); return; }
      if (e.code === 'ArrowRight') { e.preventDefault(); practiceNext(); return; }
      if (e.code === 'ArrowLeft') { e.preventDefault(); practicePrev(); return; }
    });
